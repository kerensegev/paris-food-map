  .b-eiffel { background: #059669; }
  .b-patiss { background: #7c3aed; }

  .b-choco { background: #92400e; }
  .b-fashion { background: #db2777; }
  .b-shoes { background: #0891b2; }
  .b-brunch { background: #f59e0b; }
  #map { flex: 1; }
  .popup { direction: rtl; text-align: right; min-width: 190px; }
  .popup h3 { font-size: 15px; margin-bottom: 2px; }
  .popup .type { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
  .popup .note { font-size: 13px; margin-bottom: 6px; }
  .popup .addr { font-size: 12px; color: #6b7280; direction: ltr; text-align: right; margin-bottom: 6px; }
  .popup a {
    display: inline-block; background: #2563eb; color: #fff; text-decoration: none;
    border-radius: 6px; padding: 4px 10px; font-size: 13px; font-weight: 600;
  }
  .leaflet-popup-content { margin: 12px 14px; }
</style>

const COLORS = { louvre:"#2563eb", marais:"#dc2626", eiffel:"#059669", patiss:"#7c3aed", pasta:"#ea580c", choco:"#92400e", fashion:"#db2777", shoes:"#0891b2", brunch:"#f59e0b" };
const GROUP_NAMES = { louvre:"רובע 1 / לובר", marais:"המארה", eiffel:"מגדל אייפל", patiss:"פטיסרי", pasta:"איטלקי", choco:"שוקולד", fashion:"אופנה", shoes:"נעליים", brunch:"בוקר ליד המלון" };

const map = L.map("map").setView([48.8600, 2.3300], 13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);

function makeIcon(color) {
  return L.divIcon({
    className: "",
    html: `<svg width="30" height="42" viewBox="0 0 30 42" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 0C6.7 0 0 6.7 0 15c0 11 15 27 15 27s15-16 15-27C30 6.7 23.3 0 15 0z" fill="${color}"/>
      <circle cx="15" cy="15" r="6" fill="#fff"/></svg>`,
    iconSize: [30, 42], iconAnchor: [15, 42], popupAnchor: [0, -40]
  });
}

const layers = { louvre: L.layerGroup(), marais: L.layerGroup(), eiffel: L.layerGroup(), patiss: L.layerGroup(), pasta: L.layerGroup(), choco: L.layerGroup(), fashion: L.layerGroup(), shoes: L.layerGroup(), brunch: L.layerGroup() };

PLACES.forEach(p => {
  const q = encodeURIComponent(p.name + ", " + p.addr + ", Paris");
  const html = `<div class="popup">
    <h3>${p.name}</h3>
    <div class="type">${p.type} · ${GROUP_NAMES[p.g]}</div>
    <div class="note">${p.note}</div>
    <div class="addr">${p.addr}</div>
    <a href="https://www.google.com/maps/search/?api=1&query=${q}" target="_blank" rel="noopener">פתיחה ב-Google Maps ↗</a>
  </div>`;
  L.marker([p.lat, p.lng], { icon: makeIcon(COLORS[p.g]) }).bindPopup(html).addTo(layers[p.g]);
});

Object.values(layers).forEach(l => l.addTo(map));

// סימון קבוע של המלון (תמיד מוצג)
const hotelIcon = L.divIcon({
  className: "",
  html: `<svg width="36" height="48" viewBox="0 0 30 42" xmlns="http://www.w3.org/2000/svg">
    <path d="M15 0C6.7 0 0 6.7 0 15c0 11 15 27 15 27s15-16 15-27C30 6.7 23.3 0 15 0z" fill="#111827"/>
    <text x="15" y="20" text-anchor="middle" font-size="14">🏨</text></svg>`,
  iconSize: [36, 48], iconAnchor: [18, 48], popupAnchor: [0, -46]
});
L.marker([48.86050, 2.34790], { icon: hotelIcon, zIndexOffset: 1000 })
  .bindPopup(`<div class="popup"><h3>🏨 Citadines Les Halles</h3><div class="note">המלון שלך — נקודת המוצא לכל המפה.</div><div class="addr">4 Rue des Innocents, 75001</div></div>`)
  .addTo(map);

["louvre", "marais", "eiffel", "patiss", "pasta", "choco", "fashion", "shoes", "brunch"].forEach(g => {
  const btn = document.getElementById("f-" + g);
  btn.addEventListener("click", () => {
    if (map.hasLayer(layers[g])) { map.removeLayer(layers[g]); btn.classList.add("off"); }
    else { layers[g].addTo(map); btn.classList.remove("off"); }
  });
});
</script>
</body>
</html>
